services:
  # Single web service — FastAPI serves both the API and the built React SPA.
  # This eliminates CORS issues and simplifies deployment.
  - type: web
    name: swipe2export
    runtime: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      npm install --legacy-peer-deps
      npm run build:client
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false          # Paste your AQ.xxx key in Render dashboard
      - key: NEWS_API_KEY
        sync: false          # Optional — app has fallback articles
      - key: DB_PATH
        value: /opt/render/project/src/backend/swipe2export.db
