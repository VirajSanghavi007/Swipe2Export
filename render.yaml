services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: swipe2export-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: NEWS_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: DATA_DIR
        value: ../data
      - key: ALLOWED_ORIGINS
        value: https://swipe2export.onrender.com
      - key: DB_PATH
        value: /opt/render/project/src/backend/swipe2export.db

  # ── React Frontend (Static Site) ────────────────────────────────────────
  - type: web
    name: swipe2export-frontend
    runtime: static
    buildCommand: npm ci && npm run build:client
    staticPublishPath: dist/spa
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: swipe2export-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
